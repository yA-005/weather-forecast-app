
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Forecast App</title>
    <script src="<https://cdn.tailwindcss.com>"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-6 rounded-lg shadow-lg w-full max-w-md">
        <h1 class="text-2xl font-bold text-center mb-4">Weather Forecast</h1>

        <!-- Search section -->
        <div class="flex gap-2 mb-4">
            <input type="text" id="cityInput" placeholder="Enter city name"
                class="flex-1 p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button id="searchBtn"
                    class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 transition">
                Search
            </button>
            <div id = "forecastSection" class = "mt-6 hidden">
                <h3 class = "text-lg font-semibold mb-3">
                    5-Day Forecast
                </h3>
                <div id = "forecastContainer" class = "grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">
                    <!-- Forecast cards will be inserted here -->
                </div>
            </div>
            <!-- Recent Search Section  -->
            <div id = "recentContainer" class = "mt-2 hidden">
                <label class = "block text-sm font-medium text-gray-700 mb-1">Recent Cities:</label>
                <select id = "recentSelect" class = "w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value = >-- Select a city ---</option>
                </select>
            </div>
        <!-- geolocation button  -->
            <button id="locationBtn" class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600 transition"> 
                📍 My location
            </button>
        </div>

        <!-- Weather info display -->
        <div id="weatherInfo" class="text-center hidden">
            <!-- Data will appear here -->
        </div>

        <!-- Error display -->
        <div id="errorMsg" class="text-red-500 text-center hidden"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
